<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirme seu Telefone</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f7f7f7; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background-color: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #ea1d2c; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: center; }
        .btn-avancar { background-color: #ea1d2c; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-pular { background-color: transparent; color: #666; border: none; padding: 10px; width: 100%; font-size: 14px; cursor: pointer; margin-top: 15px; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Falta pouco!</h2>
        <p>Insira seu número de telefone para receber avisos sobre a entrega do seu pedido.</p>
        <input type="tel" id="phone" placeholder="(16) 99999-9999">
        <button class="btn-avancar" onclick="salvarTelefone()">Confirmar Número</button>
        <button class="btn-pular" onclick="pularEtapa()">Pular esta etapa</button>
    </div>

    <script>
        function salvarTelefone() {
            const tel = document.getElementById('phone').value;
            if(tel === "") { alert("Por favor, digite o seu número ou clique em Pular."); return; }
            alert("Telefone salvo com sucesso!");
            window.location.href = 'cardapio.html';
        }
        function pularEtapa() { window.location.href = 'cardapio.html'; }
    </script>
</body>
</html>
