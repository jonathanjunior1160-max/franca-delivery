<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franca Delivery - Inicializando</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f7f7f7; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loading-box { text-align: center; color: #ea1d2c; font-weight: bold; }
    </style>
</head>
<body>

    <div class="loading-box">
        <p>Inicializando Franca Delivery...</p>
        <p style="font-size: 12px; color: #666;">Por favor, aceite as permissões na tela.</p>
    </div>

    <script>
        // Executa assim que a página abre
        window.addEventListener('load', async () => {
            alert("Franca Delivery precisa de permissões para continuar.");

            // 1. Pede permissão de Localização Real do Navegador/Celular
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => { console.log("Localização aceita"); },
                    (error) => { console.log("Localização recusada"); }
                );
            }

            // 2. Pede permissão de Notificação Real do Navegador/Celular
            if ("Notification" in window) {
                await Notification.requestPermission();
            }

            // Após pedir as permissões, empurra para a nova tela de cadastro/login de 3 passos
            setTimeout(() => {
                window.location.href = "login.html";
            }, 2000);
        });
    </script>
</body>
</html>
