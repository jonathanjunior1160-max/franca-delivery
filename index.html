<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Franca Delivery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        h2 { color: #ea1d2c; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn-login {
            background-color: #ea1d2c;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn-login:hover { background-color: #b81420; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Franca Delivery</h2>
        <p>Entre ou crie sua conta para pedir</p>
        
        <input type="email" id="email" placeholder="Seu e-mail" required>
        <input type="password" id="password" placeholder="Sua senha" required>
        
        <button class="btn-login" id="btnEntrar">Entrar / Cadastrar</button>
    </div>

    <!-- CÓDIGO UNIFICADO E CORRIGIDO DO FIREBASE -->
    <script type="module">
        // 1. Importando as ferramentas com os links completos do Google
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://gstatic.com";

        // 2. Suas credenciais oficiais do franca-delivery
        const firebaseConfig = {
            apiKey: "AIzaSyDHtVzMpI6kj-xMZPuBDC6pjnWCG3CEfIo",
            authDomain: "franca-delivery-ac654.firebaseapp.com",
            projectId: "franca-delivery-ac654",
            storageBucket: "franca-delivery-ac654.firebasestorage.app",
            messagingSenderId: "673949917391",
            appId: "1:673949917391:web:6e43dba9cadfe21b2857ba",
            measurementId: "G-9DCPECHLFH"
        };

        // 3. Inicializando o Firebase e o sistema de Autenticação
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 4. Lógica de clique do botão
        document.getElementById('btnEntrar').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Por favor, preencha o e-mail e a senha!");
                return;
            }

            // Tenta fazer o login
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("Bem-vindo de volta!");
                    window.location.href = 'telefone.html'; 
                })
                .catch((error) => {
                    // Se a conta não existir ou os dados forem novos, o sistema cria o cadastro na hora!
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential' || error.code === 'auth/invalid-login-credentials') {
                        createUserWithEmailAndPassword(auth, email, password)
                            .then((userCredential) => {
                                alert("Conta criada com sucesso no Firebase!");
                                window.location.href = 'telefone.html'; 
                            })
                            .catch((createError) => {
                                alert("Erro ao criar conta: " + createError.message);
                            });
                    } else {
                        alert("Erro no sistema: " + error.message);
                    }
                });
        });
    </script>

</body>
</html>
